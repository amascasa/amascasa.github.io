    <div id="modal">

        <div id="modal-content">

            <img id="modal-img" src="" alt="">

            <div id="modal-description"></div>

        </div>

    </div>

    <script id="load-all-photos">

            const categories = [
            { name: "paintings",   path: "opt-images/paintings",    count: 12 },
            { name: "tiles",       path: "opt-images/tiles",       count: 10 },
            { name: "clothes",      path: "opt-images/clothes",     count: 4 },
            { name: "glassware",    path: "opt-images/glassware",   count: 6 },
            { name: "sculptures",    path: "opt-images/scupltures",  count: 2 },
            { name: "faux-finish",   path: "opt-images/faux-finish", count: 9 },
            { name: "murals",        path: "opt-images/murals",      count: 3 }
            ];

            const artworkDescriptions = {

                "paintings-1": "Sunset landscape — acrylic on canvas",
                "paintings-2": "Abstract color study — mixed media",
                "paintings-3": "Ocean inspired piece — acrylic",
                
                "tiles-1": "Hand painted ceramic tile",
                "tiles-2": "Decorative tile installation",

                "glassware-1": "Hand blown glass vessel",

                "sculptures-1": "Mixed media sculpture",

                "murals-1": "Large scale wall mural"

            };

            categories.forEach(category => {
            const container = document.getElementById(`${category.name}-container`);

            for (let i = 1; i <= category.count; i++) {
                const img = document.createElement("img");

                img.id = `${category.name}-${i}`;
                img.classList.add(category.name, "categories-container", "zoom"); 
                img.src = `${category.path}/ericco-${category.name}-${i}.jpg`;
                img.loading = 'lazy';
                img.alt = `${category.name} ${i}`;

                img.dataset.description =
                    artworkDescriptions[`${category.name}-${i}`]
                    ||
                    "EriccoStudio artwork";

                                container.appendChild(img);
                            }
                            });

            /* ===== Modal Logic ===== */

            const modal = document.getElementById("modal");
            const modalImg = document.getElementById("modal-img");
            const modalDescription = document.getElementById("modal-description");

            document.addEventListener("click", e => {
            if (e.target.classList.contains("categories-container" )) {
                modal.classList.add("active");
               modalImg.src = e.target.src;

                modalDescription.textContent =
                    e.target.dataset.description;
                            } else if (e.target.id === "modal") {
                                modal.classList.remove("active");
                            }
                            });

            document.addEventListener("keydown", e => {
            if (e.key === "Escape") {
                modal.classList.remove("active");
            }
            });



    </script>
